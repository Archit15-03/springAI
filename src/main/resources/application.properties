spring.application.name=sprinAI
server.port=8090

# ?? PostgreSQL ??????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/javadocsai
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update

# ?? Groq (chat model ? fast, free) ?????????????????????
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.embedding.enabled=false
spring.ai.model.chat=openai

# ?? Ollama (embeddings only ? local, free) ??????????????
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.chat.enabled=false

# ?? PGVector ????????????????????????????????????????????
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.initialize-schema=true

# ?? File Upload ?????????????????????????????????????????
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ?? Bean conflict fix ???????????????????????????????????
spring.main.allow-bean-definition-overriding=true

# ?? Logging ?????????????????????????????????????????????
logging.level.org.springframework.ai=INFO